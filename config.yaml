# ─────────────────────────────────────────────
#  Telecom Complaint Intelligence — Config
# ─────────────────────────────────────────────

# ── Paths ─────────────────────────────────────
paths:
  raw_fcc_data:          "data/raw/fcc_full_3million.csv"
  cleaned_fcc_data:      "data/processed/cleaned_telecom_complaints.csv"
  comments_part1:        "data/raw/comments_part_1.json"
  comments_part2:        "data/raw/comments_part_2.json"
  comments_output:       "data/processed/youtube_comments_nlp_output.csv"
  saved_rf_model:        "models/random_forest_severity.pkl"
  saved_xgb_model:       "models/xgb_pain_level.pkl"
  saved_tfidf:           "models/tfidf_vectorizer.pkl"
  saved_scaler:          "models/standard_scaler.pkl"
  saved_label_encoder:   "models/label_encoder.pkl"

# ── Data Cleaning ──────────────────────────────
data:
  columns_to_drop_raw:
    - "caller_id_number"
    - "advertiser_business_phone_number"
    - "type_of_call_or_messge"
    - "type_of_property_goods_or_services"
    - "location_1"
    - "issue_date"
    - "issue_time"
  required_columns:
    - "method"
    - "issue"
    - "city"
    - "state"
    - "zip"
  datetime_columns:
    - "ticket_created"
    - "date_created"

# ── Feature Engineering ────────────────────────
features:
  label_encode_columns:
    - "method"
    - "city"
    - "state"
  tfidf_max_features_severity: 500
  tfidf_max_features_pain:     3000
  tfidf_ngram_range:           [1, 2]
  tfidf_stop_words:            "english"
  structural_features_severity:
    - "method_enc"
    - "state_enc"
    - "month"
  structural_features_pain:
    - "method_enc"
    - "word_count"
    - "text_length"
    - "sentiment"
    - "has_urgent_words"
  urgent_words_pattern: "not working|down|urgent|issue|failed|error"
  keyword_frequencies:
    - "network"
    - "internet"
    - "signal"
    - "slow"
    - "disconnect"

# ── Severity Mapping ───────────────────────────
severity_map:
  # Critical
  "Speed": 5
  "Tower": 5
  "Rural Call Completion": 5
  # Major
  "Availability": 4
  "Availability (including rural call completion)": 4
  "Interference": 4
  "Interference (including signal jammers)": 4
  "Equipment": 4
  # Billing / service management
  "Billing": 3
  "Cramming (unauthorized charges on your phone bill)": 3
  "Slamming (change of your carrier without permission)": 3
  "Number Portability (keeping your number if you change providers)": 3
  "Phone": 3
  # Nuisance
  "Robocalls": 2
  "Telemarketing (including do not call and spoofing)": 2
  "Unwanted Calls": 2
  "Junk Faxes": 2
  # Minor
  "Privacy": 1
  "Open Internet/Net Neutrality": 1
  "Indecency": 1
  "Pirate Radio": 1
  "Commercials/Promotions": 1
  "Loud Commercials": 1
  "Other": 1

# ── Issue Type Mapping (YouTube → FCC) ─────────
issue_map:
  "Network":       "Phone"
  "Call Drop":     "Phone"
  "Internet Speed": "Internet"
  "Slow Internet": "Internet"
  "Billing":       "TV"

# ── NLP / Sentiment ────────────────────────────
nlp:
  sentiment_positive_threshold:  0.05
  sentiment_negative_threshold: -0.05
  issue_keywords:
    Network:       ["network", "signal", "coverage"]
    "Internet Speed": ["slow", "speed", "internet", "lag"]
    "Call Drop":   ["call drop", "call disconnect"]
    Billing:       ["bill", "charge", "payment"]

# ── Model Hyperparameters ──────────────────────
models:
  random_forest_severity:
    n_estimators:      50
    max_depth:         4
    min_samples_leaf:  5
    random_state:      42

  random_forest_pain:
    n_estimators:      70
    max_depth:         7
    min_samples_split: 5
    random_state:      42
    n_jobs:           -1

  xgboost_pain:
    n_estimators:   300
    max_depth:        6
    learning_rate:    0.1
    use_label_encoder: false
    eval_metric:     "mlogloss"
    random_state:    42

  kmeans_topics:
    n_clusters: 5
    random_state: 42

# ── Training ───────────────────────────────────
training:
  test_size:   0.2
  random_state: 42
  pain_score_weights:
    method_enc:    0.4
    word_count:    0.3
    text_length:   0.3
  pain_score_noise_std: 0.5
  pain_level_quantiles:  3
  pain_level_labels:     ["Low", "Medium", "High"]
